# ── Redirection HTTP -> HTTPS ──
server {
    listen 80;
    server_name docketnova.com www.docketnova.com;
    return 301 https://$host$request_uri;
}

# ── Serveur HTTPS ──
server {
    listen 443 ssl;
    server_name docketnova.com www.docketnova.com;

    ssl_certificate     /etc/letsencrypt/live/docketnova.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/docketnova.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript image/svg+xml;

    resolver 127.0.0.11 valid=10s;

    location /demo {
        try_files $uri $uri/ /demo/index.html;
    }

    # ── Sous-requête d'authentification (interne) ──
    location = /_auth {
        internal;
        set $api_upstream http://api:3001/api/check-access;
        proxy_pass $api_upstream;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Host $host;
        proxy_set_header Cookie $http_cookie;
    }

    # ── Fichiers .jsx de l'app : protégés + type JS ──
    # (bloc regex prioritaire — doit AUSSI exiger l'auth sinon contournement)
    location ~* ^/app/.+\.jsx$ {
        auth_request /_auth;
        error_page 401 = @denied;
        default_type application/javascript;
        expires -1;
    }

    # ── App protégée : exige un cookie d'accès valide ──
    location /app {
        auth_request /_auth;
        error_page 401 = @denied;
        try_files $uri $uri/ /app/index.html;
    }

    # Redirection vers l'écran de code si non autorisé
    location @denied {
        return 302 /demo/;
    }

    location /api/ {
        set $api_upstream http://api:3001;
        proxy_pass $api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Cookie $http_cookie;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(css|js|svg|png|ico|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
