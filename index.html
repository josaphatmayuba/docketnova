  <style>
    html, body, #root { height: 100%; margin: 0; }
    body { background: var(--bg-app); }
    button, input, textarea { font-family: var(--font-sans); }

    /* Webkit scrollbars — slim, ink-tinted */
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-thumb { background: rgba(14,22,38,0.18); border-radius: 999px; border: 2px solid transparent; background-clip: content-box; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(14,22,38,0.32); border: 2px solid transparent; background-clip: content-box; }
    ::selection { background: rgba(43, 95, 168, 0.22); color: var(--ink-950); }

    /* Caret pulse for streaming text */
    @keyframes caret-pulse { 0%, 60% { opacity: 1; } 61%, 100% { opacity: 0; } }
    .lb-caret {
      display: inline-block; width: 7px; height: 1em; vertical-align: -2px;
      background: var(--oxblood-700); margin-left: 2px; animation: caret-pulse 850ms steps(1, end) infinite;
    }

    /* Block fade-in for streamed message blocks */
    @keyframes lb-blockin {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .lb-block-in { animation: lb-blockin 280ms var(--ease-out) both; }

    /* Soft pulse for "thinking" dot */
    @keyframes lb-think { 0%, 100% { opacity: 0.25; transform: scale(0.85); } 50% { opacity: 1; transform: scale(1); } }
    .lb-thinking-dot { animation: lb-think 1.1s var(--ease-in-out) infinite; }

    /* Italic case-name link, with hover state shifting to oxblood */
    .lb-case-link {
      font-family: var(--font-display); font-style: italic; font-weight: 500;
      color: var(--ink-900); cursor: pointer; text-decoration: none;
      border-bottom: 1px dotted var(--oxblood-300);
      transition: color var(--dur-fast) var(--ease-out), border-color var(--dur-fast) var(--ease-out);
    }
    .lb-case-link:hover { color: var(--oxblood-700); border-bottom-color: var(--oxblood-700); }
    /* Light variant for case links inside the dark user bubble */
    .lb-user-bubble .lb-case-link { color: #FBF8F2; border-bottom-color: rgba(229,168,177,0.55); }
    .lb-user-bubble .lb-case-link:hover { color: #E5A8B1; border-bottom-color: #E5A8B1; }

    /* Action chip hover */
    .lb-chip:hover { background: var(--ink-50); border-color: var(--ink-300); }
    .lb-chip-ink:hover { background: var(--ink-800); }

    /* Hide native focus outlines, use a tinted ring */
    button:focus-visible, input:focus-visible, textarea:focus-visible {
      outline: none; box-shadow: var(--shadow-focus);
    }

    /* Faux markdown italic / bold inside streamed strings */
    .lb-stream em { font-family: var(--font-display); font-style: italic; font-weight: 500; color: var(--ink-900); }
    .lb-stream b  { font-weight: 600; color: var(--ink-950); }
    .lb-stream code { font-family: var(--font-mono); font-size: 0.92em; background: var(--ink-50); padding: 1px 5px; border-radius: 4px; }
  </style>
